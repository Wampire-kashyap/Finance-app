<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow — Company Payment Management</title>
    <meta name="description" content="Internal company account and payment management system for tracking vendor payments, invoices, approvals, and expenses.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/charts.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-bg-effects">
            <div class="login-orb login-orb-1"></div>
            <div class="login-orb login-orb-2"></div>
            <div class="login-orb login-orb-3"></div>
        </div>
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <h1>FinanceFlow</h1>
            </div>
            <p class="login-subtitle">Internal Payment Management System</p>
            <div class="login-form">
                <label class="form-label" for="login-user">Select User Profile</label>
                <select id="login-user" class="form-select">
                    <!-- Populated by JS -->
                </select>
                <label class="form-label" for="login-password" style="margin-top:12px">Password</label>
                <div class="password-input-wrap">
                    <input type="password" id="login-password" class="form-input" placeholder="Enter password" value="demo123">
                    <button class="password-toggle" id="password-toggle" type="button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <button id="login-btn" class="btn btn-primary btn-block">Sign In</button>
            </div>
            <p class="login-hint">Demo: All accounts use password <code>demo123</code></p>
        </div>
    </div>

    <!-- Main App Shell -->
    <div id="app-shell" class="app-shell hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <span class="sidebar-brand">FinanceFlow</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Populated by JS based on role -->
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user" id="sidebar-user">
                    <div class="sidebar-user-avatar" id="sidebar-avatar">A</div>
                    <div class="sidebar-user-info">
                        <span class="sidebar-user-name" id="sidebar-username">Admin</span>
                        <span class="sidebar-user-role" id="sidebar-userrole">Administrator</span>
                    </div>
                </div>
                <button id="logout-btn" class="sidebar-logout" title="Sign Out">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <button id="mobile-menu-btn" class="mobile-menu-btn">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <div class="search-box" id="global-search-box">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="global-search" placeholder="Search invoices, vendors, payments..." class="search-input">
                        <div id="search-results-dropdown" class="search-results-dropdown hidden"></div>
                    </div>
                </div>
                <div class="header-right">
                    <span class="header-credit">Created by <a href="mailto:Kunalkumarshri47@gmail.com" style="color:var(--accent);font-weight:500">Kunalkumarshri47@gmail.com</a></span>
                    <div class="notification-bell" id="notification-bell">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span class="notification-badge" id="notification-count">0</span>
                    </div>
                    <div id="notification-panel" class="notification-panel hidden">
                        <div class="notif-panel-header">
                            <h3>Notifications</h3>
                            <button id="mark-all-read" class="btn-text">Mark all read</button>
                        </div>
                        <div id="notification-list" class="notif-list"></div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content" id="page-content">
                <!-- Dynamically rendered by router -->
            </div>
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-container" class="modal-container"></div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/store.js"></script>
    <script src="js/seed.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/components.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/vendors.js"></script>
    <script src="js/pages/categories.js"></script>
    <script src="js/pages/invoices.js"></script>
    <script src="js/pages/payments.js"></script>
    <script src="js/pages/approvals.js"></script>
    <script src="js/pages/reports.js"></script>
    <script src="js/pages/users.js"></script>
    <script src="js/pages/audit.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
